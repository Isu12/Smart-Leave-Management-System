openapi: 3.0.0
info:
  title: Auth & User Service API
  version: 1.0.0
  description: API documentation for the Auth and User microservice

servers:
  - url: http://localhost:4000/api
    description: API Gateway (Routes to Auth Service)
  - url: http://localhost:5000
    description: Direct Microservice Access (Internal/Dev only)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT+

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [EMPLOYEE, MANAGER]
        leaveBalance:
          type: integer
        isActive:
          type: boolean
        lastLogin:
          type: string
          format: date-time
        loginCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [EMPLOYEE, MANAGER]
      responses:
        '201':
          description: Created
        '400':
          description: Bad request (validation errors or user exists)

  /auth/login:
    post:
      summary: Log in to the application
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
        '403':
          description: Access denied (User on leave)

  /users:
    get:
      summary: Get all active users
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
    post:
      summary: Create a user (Managers only)
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User created

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The user ID
    get:
      summary: Get user by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '404':
          description: User not found
    put:
      summary: Update user by ID
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Soft delete user by ID (Managers only)
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully soft-deleted
