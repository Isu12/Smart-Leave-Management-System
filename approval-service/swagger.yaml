openapi: 3.0.0
info:
  title: Approval Service API
  version: 1.0.0
  description: Approval microservice for Smart Leave Management System
servers:
  - url: http://localhost:5002
paths:
  /api/approvals:
    post:
      summary: Create a new approval record
      tags: [Approvals]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalInput'
      responses:
        '201':
          description: Approval created successfully
    get:
      summary: Get all approvals
      tags: [Approvals]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of approvals
  /api/approvals/pending:
    get:
      summary: Get all pending approvals
      tags: [Approvals]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending approval list
  /api/approvals/{id}:
    get:
      summary: Get approval by ID
      tags: [Approvals]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval record
        '404':
          description: Approval not found
    put:
      summary: Update approval decision
      tags: [Approvals]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [PENDING, APPROVED, REJECTED]
                comment:
                  type: string
      responses:
        '200':
          description: Approval updated successfully
    delete:
      summary: Delete approval by ID
      tags: [Approvals]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Approval deleted successfully
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApprovalInput:
      type: object
      required:
        - leaveId
        - userId
        - approverId
        - leaveType
        - startDate
        - endDate
        - totalDays
        - reason
      properties:
        leaveId:
          type: string
          example: LV001
        userId:
          type: string
          example: USER001
        approverId:
          type: string
          example: MGR001
        leaveType:
          type: string
          enum: [ANNUAL, CASUAL, MEDICAL, UNPAID]
          example: ANNUAL
        startDate:
          type: string
          format: date
          example: 2026-03-25
        endDate:
          type: string
          format: date
          example: 2026-03-27
        totalDays:
          type: number
          example: 3
        reason:
          type: string
          example: Personal work
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED]
          example: PENDING
        comment:
          type: string
          example: Waiting for manager review
