openapi: 3.0.0
info:
  title: Department Service API
  version: 1.0.0
  description: API documentation for the Department Management microservice

servers:
  - url: http://localhost:4000
    description: API Gateway
  - url: http://localhost:5004
    description: Direct Microservice Access

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Department:
      type: object
      required:
        - name
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

paths:
  /api/departments:
    get:
      summary: Get all departments
      tags:
        - Departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
    post:
      summary: Create a department (Managers only)
      tags:
        - Departments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Created

  /api/departments/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Get department by ID
      tags:
        - Departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
    put:
      summary: Update department (Managers only)
      tags:
        - Departments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Success
    delete:
      summary: Delete department (Managers only)
      tags:
        - Departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
        '400':
          description: Cannot delete department with assigned users

  /api/departments/{id}/assign-user/{userId}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      - in: path
        name: userId
        required: true
        schema:
          type: string
    put:
      summary: Assign user to department (Managers only)
      tags:
        - Departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success

  /api/departments/{id}/users:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Get users in department
      tags:
        - Departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Success
